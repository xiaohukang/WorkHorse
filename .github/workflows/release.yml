name: release

# 打 tag 形如 v0.1.0 时自动跑打包脚本，并把 .zip / .dmg 发布为 GitHub Release。
# 当前是 ad-hoc 签名路线（不做 Developer ID 签名也不做公证）；
# 拿到 Developer ID 证书后，只需在 workflow 里把 secrets 传给 package_app.sh 即可升级到正式发布。

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Run packaging script (ad-hoc)
        env:
          VERSION: ${{ github.ref_name }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          chmod +x ./scripts/package_app.sh
          ./scripts/package_app.sh

      - name: List release artifacts
        run: |
          ls -lh .build
          file .build/WorkHorse-*.zip
          file .build/WorkHorse-*.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            .build/WorkHorse-*.zip
            .build/WorkHorse-*.dmg
            .build/WorkHorse-*.pkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
